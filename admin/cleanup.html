<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MouseEyes – Admin Cleanup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 2rem;
      max-width: 900px;
    }
    h1 { margin-bottom: 0.25rem; }
    h2 { margin-top: 2rem; }
    label { display: block; margin-top: 1rem; }
    input {
      padding: 0.4rem;
      font-size: 1rem;
      margin-right: 0.5rem;
    }
    button {
      padding: 0.45rem 0.8rem;
      font-size: 0.95rem;
      margin-right: 0.5rem;
      cursor: pointer;
    }
    button.danger {
      background: #c62828;
      color: white;
      border: none;
    }
    button.secondary {
      background: #e0e0e0;
      border: none;
    }
    pre {
      background: #f6f8fa;
      padding: 1rem;
      overflow-x: auto;
      max-height: 350px;
    }
    .muted {
      color: #555;
      font-size: 0.9rem;
    }
    .warning {
      color: #b71c1c;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <h1>MouseEyes – Admin Cleanup</h1>
  <div class="muted">
    Protected by Cloudflare Access · Preview required before delete
  </div>
  
	<h2>Recent Download Signups</h2>

	<button onclick="loadDownloads()">Refresh table</button>

	<table id="downloadsTable"
		   style="margin-top:1rem; width:100%; border-collapse:collapse;"
		   border="1"
		   cellpadding="6">
	  <thead>
		<tr style="background:#f0f0f0;">
		  <th>Date</th>
		  <th>Name</th>
		  <th>Email</th>
		  <th>Updates</th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <td colspan="4">Loading…</td>
		</tr>
	  </tbody>
	</table>

  <!-- ===== Delete by Date ===== -->
  <h2>Delete records older than a date</h2>

  <label>
    Delete records created before:
    <input type="date" id="dateBefore" />
  </label>

  <div style="margin-top: 0.75rem;">
    <button class="secondary" onclick="previewByDate()">Preview</button>
    <button class="danger" onclick="executeByDate()">Execute delete</button>
  </div>

  <p id="dateSummary" class="warning"></p>

  <!-- ===== Delete by Name Prefix ===== -->
  <h2>Delete records by name prefix</h2>

  <label>
    Name starts with:
    <input type="text" id="namePrefix" placeholder="Pat" />
  </label>

  <div style="margin-top: 0.75rem;">
    <button class="secondary" onclick="previewByPrefix()">Preview</button>
    <button class="danger" onclick="executeByPrefix()">Execute delete</button>
  </div>

  <p id="prefixSummary" class="warning"></p>

  <!-- ===== Output ===== -->
  <h2>Response</h2>
  <pre id="output">(nothing yet)</pre>

<script>

	async function loadDownloads() {
	  const tbody = document.querySelector("#downloadsTable tbody");
	  tbody.innerHTML = "<tr><td colspan='4'>Loading…</td></tr>";

	  let response;
	  try {
		response = await fetch("/admin/downloads?limit=50");
	  } catch (err) {
		tbody.innerHTML = "<tr><td colspan='4'>Failed to fetch data</td></tr>";
		return;
	  }

	  const data = await response.json();
	  const rows = data.rows || [];

	  tbody.innerHTML = "";

	  if (rows.length === 0) {
		tbody.innerHTML = "<tr><td colspan='4'>No records found</td></tr>";
		return;
	  }

	  for (const row of rows) {
		const tr = document.createElement("tr");

		tr.innerHTML = `
		  <td>${escapeHtml(row.created_at)}</td>
		  <td>${escapeHtml(row.name)}</td>
		  <td>${escapeHtml(row.email || "")}</td>
		  <td style="text-align:center;">${row.updates ? "✔" : ""}</td>
		`;

		tbody.appendChild(tr);
	  }
	}

	/* Simple HTML escaping to avoid accidental injection */
	function escapeHtml(value) {
	  return (value ?? "").toString().replace(/[&<>"']/g, c => ({
		"&": "&amp;",
		"<": "&lt;",
		">": "&gt;",
		'"': "&quot;",
		"'": "&#39;"
	  })[c]);
	}

	/* Auto-load table when page opens */
	loadDownloads();

  let lastDatePreviewCount = null;
  let lastPrefixPreviewCount = null;

  function show(data) {
    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);
  }

  async function previewByDate() {
    const before = document.getElementById("dateBefore").value;
    if (!before) {
      alert("Select a date first.");
      return;
    }

    const res = await fetch("/admin/downloads/preview-delete-by-date", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ before, limit: 50 })
    });

    const data = await res.json();
    lastDatePreviewCount = data.match_count;

    document.getElementById("dateSummary").textContent =
      `Preview: ${data.match_count} record(s) would be deleted.`;

    show(data);
  }

  async function executeByDate() {
    const before = document.getElementById("dateBefore").value;
    if (!before || lastDatePreviewCount === null) {
      alert("Preview first.");
      return;
    }

    if (!confirm(`Delete ${lastDatePreviewCount} record(s)? This cannot be undone.`)) {
      return;
    }

    const res = await fetch("/admin/downloads/execute-delete-by-date", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        before,
        confirm: true,
        expected_count: lastDatePreviewCount
      })
    });

    const data = await res.json();
    lastDatePreviewCount = null;
    document.getElementById("dateSummary").textContent = "";

    show(data);
  }

  async function previewByPrefix() {
    const prefix = document.getElementById("namePrefix").value.trim();
    if (!prefix) {
      alert("Enter a prefix.");
      return;
    }

    const res = await fetch("/admin/downloads/preview-delete-by-name-prefix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prefix, limit: 50 })
    });

    const data = await res.json();
    lastPrefixPreviewCount = data.match_count;

    document.getElementById("prefixSummary").textContent =
      `Preview: ${data.match_count} record(s) would be deleted.`;

    show(data);
  }

  async function executeByPrefix() {
    const prefix = document.getElementById("namePrefix").value.trim();
    if (!prefix || lastPrefixPreviewCount === null) {
      alert("Preview first.");
      return;
    }

    if (!confirm(`Delete ${lastPrefixPreviewCount} record(s)? This cannot be undone.`)) {
      return;
    }

    const res = await fetch("/admin/downloads/execute-delete-by-name-prefix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prefix,
        confirm: true,
        expected_count: lastPrefixPreviewCount
      })
    });

    const data = await res.json();
    lastPrefixPreviewCount = null;
    document.getElementById("prefixSummary").textContent = "";

    show(data);
  }
</script>
</body>
</html>
