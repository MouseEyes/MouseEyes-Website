<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MouseEyes – Admin Cleanup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 2rem;
      max-width: 900px;
    }
    h1 { margin-bottom: 0.25rem; }
    h2 { margin-top: 2rem; }
    label { display: block; margin-top: 1rem; }
    input {
      padding: 0.4rem;
      font-size: 1rem;
      margin-right: 0.5rem;
    }
    button {
      padding: 0.45rem 0.8rem;
      font-size: 0.95rem;
      margin-right: 0.5rem;
      cursor: pointer;
    }
    button.danger {
      background: #c62828;
      color: white;
      border: none;
    }
    button.secondary {
      background: #e0e0e0;
      border: none;
    }
    pre {
      background: #f6f8fa;
      padding: 1rem;
      overflow-x: auto;
      max-height: 350px;
    }
    .muted {
      color: #555;
      font-size: 0.9rem;
    }
    .warning {
      color: #b71c1c;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <h1>MouseEyes – Admin Cleanup</h1>
  <div class="muted">
    Protected by Cloudflare Access · Preview required before delete
  </div>

	<h2>Recent Download Signups</h2>

	<div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
	  <button onclick="loadDownloads()">Refresh table</button>
	  <button class="secondary" onclick="selectAll(true)">Select all</button>
	  <button class="secondary" onclick="selectAll(false)">Select none</button>
	  <button class="secondary" onclick="previewSelected()">Preview selected delete</button>
	  <button class="danger" onclick="deleteSelected()">Delete selected</button>
	  <span class="muted" id="selectedCount">Selected: 0</span>
	</div>

	<table id="downloadsTable"
		   style="margin-top:1rem; width:100%; border-collapse:collapse;"
		   border="1"
		   cellpadding="6">
	  <thead>
		<tr style="background:#f0f0f0;">
		  <th style="width:42px; text-align:center;">
			<input type="checkbox" id="selectAllBox" onclick="toggleHeaderSelect(this.checked)" />
		  </th>
		  <th>Date</th>
		  <th>Name</th>
		  <th>Email</th>
		  <th>Updates</th>
		  <th style="width:70px; text-align:right;">ID</th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <td colspan="6">Loading…</td>
		</tr>
	  </tbody>
	</table>

  <!-- ===== Delete by Date ===== -->
  <h2>Delete records older than a date</h2>

  <label>
    Delete records created before:
    <input type="date" id="dateBefore" />
  </label>

  <div style="margin-top: 0.75rem;">
    <button class="secondary" onclick="previewByDate()">Preview</button>
    <button class="danger" onclick="executeByDate()">Execute delete</button>
  </div>

  <p id="dateSummary" class="warning"></p>

  <!-- ===== Delete by Name Prefix ===== -->
  <h2>Delete records by name prefix</h2>

  <label>
    Name starts with:
    <input type="text" id="namePrefix" placeholder="Pat" />
  </label>

  <div style="margin-top: 0.75rem;">
    <button class="secondary" onclick="previewByPrefix()">Preview</button>
    <button class="danger" onclick="executeByPrefix()">Execute delete</button>
  </div>

  <p id="prefixSummary" class="warning"></p>

  <!-- ===== Output ===== -->
  <h2>Response</h2>
  <pre id="output">(nothing yet)</pre>

<script>
let lastDatePreviewCount = null;
let lastPrefixPreviewCount = null;

function show(data) {
  document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}

/* ---------- TABLE + CHECKBOX STATE ---------- */

function updateSelectedCount() {
  const checked = document.querySelectorAll(".rowSelect:checked").length;
  document.getElementById("selectedCount").textContent = `Selected: ${checked}`;
}

function getSelectedIds() {
  const boxes = document.querySelectorAll(".rowSelect:checked");
  const ids = [];
  for (const b of boxes) ids.push(parseInt(b.value, 10));
  return ids.filter(n => Number.isFinite(n) && n > 0);
}

function selectAll(state) {
  const boxes = document.querySelectorAll(".rowSelect");
  for (const b of boxes) b.checked = state;
  const header = document.getElementById("selectAllBox");
  if (header) header.checked = state;
  updateSelectedCount();
}

function toggleHeaderSelect(state) {
  selectAll(state);
}

async function loadDownloads() {
  const tbody = document.querySelector("#downloadsTable tbody");
  tbody.innerHTML = "<tr><td colspan='6'>Loading…</td></tr>";

  let response;
  try {
    response = await fetch("/admin/downloads?limit=50");
  } catch {
    tbody.innerHTML = "<tr><td colspan='6'>Failed to fetch data</td></tr>";
    return;
  }

  const data = await response.json();
  const rows = data.rows || [];

  tbody.innerHTML = "";

  if (rows.length === 0) {
    tbody.innerHTML = "<tr><td colspan='6'>No records found</td></tr>";
    updateSelectedCount();
    return;
  }

  for (const row of rows) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="text-align:center;">
        <input class="rowSelect" type="checkbox" value="${row.id}" />
      </td>
      <td>${escapeHtml(row.created_at)}</td>
      <td>${escapeHtml(row.name)}</td>
      <td>${escapeHtml(row.email || "")}</td>
      <td style="text-align:center;">${row.updates ? "✔" : ""}</td>
      <td style="text-align:right;">${row.id}</td>
    `;
    tbody.appendChild(tr);
  }

  // update selected count on any click
  tbody.addEventListener("change", (e) => {
    if (e.target && e.target.classList.contains("rowSelect")) {
      updateSelectedCount();
    }
  }, { once: true });

  // Reset header select
  const header = document.getElementById("selectAllBox");
  if (header) header.checked = false;

  updateSelectedCount();
}

/* ---------- DELETE SELECTED (PREVIEW + EXECUTE) ---------- */

async function previewSelected() {
  const ids = getSelectedIds();
  if (ids.length === 0) {
    alert("Select one or more rows first.");
    return;
  }

  const res = await fetch("/admin/downloads/preview-delete-by-ids", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids })
  });

  const data = await res.json();
  show(data);
}

async function deleteSelected() {
  const ids = getSelectedIds();
  if (ids.length === 0) {
    alert("Select one or more rows first.");
    return;
  }

  // Always do a server preview first to get match_count for safety
  const previewRes = await fetch("/admin/downloads/preview-delete-by-ids", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids })
  });
  const preview = await previewRes.json();

  if (!preview.ok) {
    show(preview);
    alert("Preview failed. See response.");
    return;
  }

  const count = preview.match_count || 0;
  show(preview);

  if (!confirm(`Delete ${count} record(s) (selected IDs)? This cannot be undone.`)) {
    return;
  }

  const execRes = await fetch("/admin/downloads/execute-delete-by-ids", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ids,
      confirm: true,
      expected_count: count
    })
  });

  const result = await execRes.json();
  show(result);

  // refresh table after delete
  await loadDownloads();
}

/* ---------- FIXED HTML ESCAPING ---------- */

function escapeHtml(value) {
  return (value ?? "").toString().replace(/[&<>"']/g, c => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  })[c]);
}

/* ---------- EXISTING DATE/PREFIX DELETE FUNCTIONS ---------- */
/* Keep your existing previewByDate/executeByDate/previewByPrefix/executeByPrefix here */

/* Auto-load table when page opens */
loadDownloads();
</script>
</body>
</html>
