
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MouseEyes — Purchase License</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicon-32x32.png" />
</head>

<body class="page-purchase">

  <!-- Site Header (NOW MATCHES SUPPORT PAGE) -->
  <header class="site-header">
    <div class="header-left">
      <img
        src="/images/mouseeyes-logo.png"
        alt="MouseEyes logo"
        class="site-logo"
      />
      <h1 class="page-title">Purchase License</h1>
    </div>

    <nav class="header-nav" aria-label="Primary">
      <a href="/">Home</a>
      <a href="/download.html">Download</a>
      <a href="/pricing.html">Pricing</a>
      <strong>Purchase</strong>
      <a href="/privacy.html">Privacy</a>
    </nav>
  </header>

  <!-- Main Page Content -->
  <main>
    <h2>Purchase</h2>

    <form id="purchaseForm">

      <fieldset>
        <legend>License Type</legend>

        <label>
          <input type="radio" name="licenseKind" value="Yearly" />
          Yearly — $5 per year
        </label><br />

        <label>
          <input type="radio" name="licenseKind" value="Lifetime" />
          Lifetime — $20 one‑time
        </label>
      </fieldset>

      <br />

      <label>
        Name<br />
        <input type="text" id="customerName" required />
      </label>

      <br /><br />

      <label>
        Email<br />
        <input type="email" id="customerEmail" required />
      </label>

      <br /><br />

      <button type="submit">
        Continue to Secure Checkout
      </button>
    </form>
  </main>

  <!-- Stripe / Checkout Script -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const licenseFromQuery = params.get("license");

    if (licenseFromQuery) {
      const radio = document.querySelector(
        `input[name="licenseKind"][value="${licenseFromQuery}"]`
      );
      if (radio) radio.checked = true;
    }

    document.getElementById("purchaseForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const licenseKind =
        document.querySelector('input[name="licenseKind"]:checked')?.value;

      if (!licenseKind) {
        alert("Please select a license type.");
        return;
      }

      const name = document.getElementById("customerName").value.trim();
      const email = document.getElementById("customerEmail").value.trim();

      if (!name || !email) {
        alert("Please enter your name and email.");
        return;
      }

      const clickDate = new Date();
      const purchaseClickUtcIso = clickDate.toISOString();
      const purchaseClickLocalDate = clickDate.toLocaleDateString("en-CA");

      const res = await fetch("/api/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          licenseKind,
          customerName: name,
          customerEmail: email,
          purchaseClickUtcIso,
          purchaseClickLocalDate
        })
      });

      const data = await res.json();
      if (data?.url) {
        window.location.href = data.url;
      } else {
        alert("Failed to start checkout.");
      }
    });
  </script>

</body>
</html>
